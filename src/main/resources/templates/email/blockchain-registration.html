<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>iDear - 블록체인 등록 결과</title>
</head>
<body>
    <h1 th:text="'안녕하세요, ' + ${userName} + '님.'">안녕하세요, [사용자]님.</h1>
    <p>요청하신 아이디어의 블록체인 등록이 완료되었습니다.</p>
    <p><strong>등록 상태:</strong> <span th:text="${registrationStatus}">[상태]</span></p>
    <p th:if="${failureReason != null}"><strong>실패 사유:</strong> <span th:text="${failureReason}">[실패 사유]</span></p>
    <br/>
    <p>감사합니다.</p>
    <p><strong>iDear 팀 드림</strong></p>
</body>
</html>
