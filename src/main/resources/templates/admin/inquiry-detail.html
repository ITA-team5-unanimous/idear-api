<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>iDear - 문의 상세 및 답변</title>
    <style>
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .inquiry-details, .reply-form { border: 1px solid #ddd; padding: 20px; margin-bottom: 20px; }
        h1, h2 { border-bottom: 1px solid #eee; padding-bottom: 10px; }
        p { white-space: pre-wrap; }
        textarea { width: 100%; height: 150px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>문의 상세</h1>
        <div class="inquiry-details">
            <p><strong>ID:</strong> <span th:text="${inquiry.id}">1</span></p>
            <p><strong>문의자:</strong> <span th:text="${inquiry.inquirerName} + ' (' + ${inquiry.inquirerEmail} + ')'"></span></p>
            <p><strong>제목:</strong> <span th:text="${inquiry.title}"></span></p>
            <p><strong>상태:</strong> <span th:text="${inquiry.status}"></span></p>
            <p><strong>문의일시:</strong> <span th:text="${#temporals.format(inquiry.createdAt, 'yyyy-MM-dd HH:mm')}"></span></p>
            <h2>문의 내용</h2>
            <p th:text="${inquiry.content}"></p>
        </div>

        <div class="reply-form" th:if="${inquiry.status.name() == 'PENDING'}">
            <h2>답변 작성</h2>
            <form th:action="@{/admin/inquiries/{id}/reply(id=${inquiry.id})}" th:object="${replyRequest}" method="post">
                <textarea th:field="*{responseContent}" placeholder="답변 내용을 입력하세요..."></textarea>
                <br/><br/>
                <button type="submit">이메일로 답변 보내기</button>
            </form>
        </div>
        <div th:if="${inquiry.status.name() == 'ANSWERED'}">
            <h2>완료</h2>
            <p>이미 답변이 완료된 문의입니다.</p>
        </div>
        <br/>
        <a href="/admin/inquiries">목록으로 돌아가기</a>
    </div>
</body>
</html>
